# ============================================================================
# Vanchor-NG — pinned lockfile for reproducible installs (Raspberry Pi deploy)
# ============================================================================
#
# Fully pinned (==) versions for a repeatable install on the boat's Pi. Unlike
# requirements.txt (which carries loose >= floors), this file freezes the exact
# resolved versions — including the transitive dependency closure — so a fresh
# `pip install` on the Pi lands on the SAME set that is tested here.
#
# All of these ship as prebuilt aarch64 (manylinux) wheels, so nothing compiles
# on the Pi. Every version below was read from the tested .venv, not invented.
#
# ---------------------------------------------------------------------------
# Install (runtime only — core + water routing):
#
#     python -m venv .venv && . .venv/bin/activate
#     pip install --upgrade pip
#     pip install -r requirements.lock          # then: pip install -e . --no-deps
#
# `pip install -e . --no-deps` installs the `vanchor` package itself (the
# console script) without letting pip re-resolve dependencies — the lock owns
# the versions. See docs/deploy-pi.md for the full deployment walkthrough.
#
# ---------------------------------------------------------------------------
# How to regenerate this file:
#
# This lock is the transitive closure of the RUNTIME dependencies declared in
# pyproject.toml ([project].dependencies + the `routing` and `serial` optional
# extras), pinned to the versions in the project .venv. To rebuild it after a
# dependency bump, install into a clean venv and freeze that closure, e.g.:
#
#     python -m venv /tmp/lockenv && /tmp/lockenv/bin/pip install -U pip
#     /tmp/lockenv/bin/pip install \
#         "fastapi>=0.110" "uvicorn[standard]>=0.27" "python-multipart>=0.0.9" \
#         "numpy>=1.24" "pyyaml>=6.0" "orjson>=3.9" \
#         "shapely>=2.0" "networkx>=3.0" "pyproj>=3.5" "requests>=2.28" \
#         "pyserial>=3.5" "pyserial-asyncio>=0.6"
#     /tmp/lockenv/bin/pip freeze > requirements.lock   # then re-add these headers
#
# Keep the >= floors in pyproject.toml as the source of truth for WHICH
# packages are required; this file only pins the resolved versions.
# ============================================================================


