name: Release

# Two ways in:
#   * workflow_dispatch  — pick a bump (default: alpha). CI bumps the version,
#     rolls the CHANGELOG, commits, tags v<version>, pushes, and publishes the
#     GitHub Release. This is the "auto-incrementing alpha" path.
#   * push a tag v*       — publish a GitHub Release for an already-pushed tag
#     (e.g. one cut locally). Notes come from the matching CHANGELOG section.
#
# Note: the bump job pushes a commit + tag to the default branch, so the branch
# must allow the Actions bot to push (no protection rule that blocks it).
on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump"
        type: choice
        options: [alpha, patch, minor, major, final]
        default: alpha
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  bump:
    name: Bump, tag, and release
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Bump version + roll CHANGELOG
        id: v
        run: |
          NEW=$(python scripts/bump_version.py --part "${{ inputs.bump }}" --changelog)
          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          echo "Bumped to $NEW"

      - name: Commit, tag, push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml CHANGELOG.md
          git commit -m "release: v${{ steps.v.outputs.version }}"
          git tag "v${{ steps.v.outputs.version }}"
          git push origin "HEAD:${{ github.ref_name }}"
          git push origin "v${{ steps.v.outputs.version }}"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VER="${{ steps.v.outputs.version }}"
          NOTES=$(awk -v v="[$VER]" '$0 ~ /^## / && index($0, v){f=1; next} f && /^## /{exit} f{print}' CHANGELOG.md)
          gh release create "v$VER" --title "v$VER" --prerelease \
            --notes "${NOTES:-Release v$VER}"

  publish:
    name: Publish release for a pushed tag
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          VER="${TAG#v}"
          NOTES=$(awk -v v="[$VER]" '$0 ~ /^## / && index($0, v){f=1; next} f && /^## /{exit} f{print}' CHANGELOG.md)
          # Mark alpha/beta/rc versions as pre-releases.
          PRE=""
          case "$VER" in *a*|*b*|*rc*) PRE="--prerelease" ;; esac
          gh release create "$TAG" --title "$TAG" $PRE \
            --notes "${NOTES:-Release $TAG}"
