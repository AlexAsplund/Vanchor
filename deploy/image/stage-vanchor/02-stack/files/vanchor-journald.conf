# SD-card wear minimisation: keep journal in RAM (volatile).
# Logs are lost on power cycle -- this is the expected trade-off on a boat Pi.
# To debug a hard crash: set Storage=persistent and remove this file, then reboot.
# See docs/deploy-pi.md (Appendix B: SD-write minimisation debugging).
[Journal]
Storage=volatile
SystemMaxUse=32M
ForwardToConsole=no
