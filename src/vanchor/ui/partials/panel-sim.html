      <section class="cm-panel hidden" data-cat="sim">

      <!-- Simulator-only: revealed only when telemetry.sim_enabled is true. -->
      <details class="card sim-only hidden" id="sim-card">
        <summary>Simulator <span class="badge">SIM</span></summary>
        <div class="hint">Environment forcing &amp; teleport — simulation only.</div>
        <div class="ctx-sub">Boat</div>
        <div class="hint">Pick a preset hull/motor for the simulated boat.</div>
        <div class="btn-row">
          <button id="select-boat-open" class="btn-primary" type="button">⛵ Select Boat</button>
        </div>
        <div id="select-boat-current" class="hint"></div>
        <div class="row hidden" id="weather-preset-row">
          <label for="weather-preset">Weather preset</label>
          <select id="weather-preset"><option value="">— choose —</option></select>
        </div>
        <div class="slider-row"><label>Wind variability <output id="wv-val">0</output></label>
          <input type="range" id="wv" min="0" max="1" step="0.05" value="0" /></div>
        <div class="slider-row"><label>Current speed <output id="cs-val">0</output> m/s</label>
          <input type="range" id="cs" min="0" max="2" step="0.05" value="0.25" /></div>
        <div class="slider-row"><label>Current dir <output id="cd-val">90</output>°</label>
          <input type="range" id="cd" min="0" max="359" step="1" value="90" /></div>
        <div class="slider-row"><label>Wind speed <output id="ws-val">0</output> m/s</label>
          <input type="range" id="ws" min="0" max="15" step="0.5" value="3" /></div>
        <div class="slider-row"><label>Wind dir <output id="wd-val">120</output>°</label>
          <input type="range" id="wd" min="0" max="359" step="1" value="120" /></div>
        <div class="slider-row"><label>Gusts <output id="ga-val">0</output> m/s</label>
          <input type="range" id="ga" min="0" max="8" step="0.5" value="0" /></div>
        <div class="hint" id="env-now">wind now: —</div>
        <div class="ctx-sub">Teleport boat</div>
        <div class="hint">Instantly relocate the simulated boat. Tap the map, or type coordinates.</div>
        <div class="btn-row">
          <button id="teleport-pick" class="btn-primary">🛰 Teleport boat</button>
        </div>
        <div class="row">
          <label for="teleport-lat">Lat</label>
          <input type="number" id="teleport-lat" inputmode="decimal" step="0.000001" placeholder="lat" />
          <label for="teleport-lon">Lon</label>
          <input type="number" id="teleport-lon" inputmode="decimal" step="0.000001" placeholder="lon" />
          <button id="teleport-go" class="btn-ghost">Go</button>
        </div>
        <div id="teleport-status" class="hint"></div>
      </details>

      </section><!-- /sim -->
